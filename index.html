<style>
:root{
 --bg-1:#0b1b2a;--bg-2:#091528;--card:rgba(13,28,45,.78);
 --stroke:#1a3550;--text:#e9f0f7;--muted:#a9b7c6;
 --shadow:0 20px 60px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
body{
 margin:0;font-family:Cairo,sans-serif;color:var(--text);
 background:
 radial-gradient(1200px 800px at 70% 10%, #0e2540 0%, transparent 60%),
 radial-gradient(1000px 700px at 20% 80%, #061227 0%, transparent 55%),
 linear-gradient(180deg,var(--bg-1),var(--bg-2));
}
.wrap{min-height:100vh;display:grid;place-items:center;padding:32px 16px}
.card{width:min(720px,100%);background:var(--card);border:1px solid var(--stroke);
 border-radius:28px;box-shadow:var(--shadow);padding:28px}
.head{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.logo{width:44px;height:44px;border-radius:12px;overflow:hidden;border:1px solid var(--stroke);
 margin-inline-start:auto}
.logo img{width:100%;height:100%;object-fit:cover}
.title{font-size:22px;font-weight:800}
.subtitle{color:var(--muted);font-size:14px}
.links{display:grid;gap:14px;margin-top:16px}
.link{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text);
 padding:18px;border-radius:22px;border:1px solid var(--stroke);
 background:rgba(9,20,34,.65)}
.icon{width:44px;height:44px;border-radius:14px;background:#0c1b2d;
 border:1px solid var(--stroke);display:flex;align-items:center;
 justify-content:center;margin-inline-start:auto}
.icon img{width:28px;height:28px}
.name{font-weight:700}
.hint{color:var(--muted);font-size:13px}
.footer{margin-top:22px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
